services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: telegram_mt5
      POSTGRES_USER: telegram_mt5
      POSTGRES_PASSWORD: telegram_mt5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && python run.py"
    environment:
      DATABASE_URL: postgresql+psycopg://telegram_mt5:telegram_mt5@db:5432/telegram_mt5
      JWT_SECRET: change-me
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

  worker:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && python -m app.workers.runner"
    environment:
      DATABASE_URL: postgresql+psycopg://telegram_mt5:telegram_mt5@db:5432/telegram_mt5
      JWT_SECRET: change-me
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
